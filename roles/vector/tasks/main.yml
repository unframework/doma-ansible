---
- name: Ensure Vector config directory exists
  file:
    path: "{{ vector_config_dir }}"
    state: directory
    mode: '0755'

- name: Ensure Vector data directory exists
  file:
    path: "{{ vector_data_dir }}"
    state: directory
    mode: '0755'

- name: Ensure user systemd directory exists
  file:
    path: "{{ ansible_env.HOME }}/.config/systemd/user"
    state: directory
    mode: '0755'

- name: Template Vector config
  template:
    src: vector.toml.j2
    dest: "{{ vector_config_dir }}/vector.toml"
    mode: '0644'
  notify: Reload Vector

- name: Template Vector systemd service
  template:
    src: vector.service.j2
    dest: "{{ ansible_env.HOME }}/.config/systemd/user/vector.service"
    mode: '0644'
  notify: Reload Vector systemd

- name: Enable and start Vector service
  systemd:
    name: vector
    enabled: yes
    state: started
    scope: user
    daemon_reload: yes
